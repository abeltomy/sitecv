name: Sync Consumed

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs = require('fs');

          const DATABASE_ID = '1c096cad5eb88012abcdf4bd6059cfd1';

          function request(body) {
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.notion.com',
                path: `/v1/databases/${DATABASE_ID}/query`,
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.NOTION_TOKEN}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
                },
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function main() {
            const items = [];
            let cursor = undefined;

            do {
              const payload = { page_size: 100, sorts: [{ timestamp: 'created_time', direction: 'descending' }] };
              if (cursor) payload.start_cursor = cursor;

              const data = await request(JSON.stringify(payload));

              if (data.status === 400 || data.object === 'error') {
                console.error('Notion API error:', JSON.stringify(data));
                process.exit(1);
              }

              for (const page of data.results) {
                const props = page.properties;
                const nameArr = props['Name']?.title ?? [];
                const name = nameArr.map(t => t.plain_text).join('');
                const url = props['URL']?.url ?? null;
                items.push({ name, url, date: page.created_time.slice(0, 10) });
              }

              cursor = data.has_more ? data.next_cursor : null;
            } while (cursor);

            const out = { updated: new Date().toISOString(), items };
            fs.writeFileSync('consumed.json', JSON.stringify(out, null, 2));
            console.log(`Wrote ${items.length} items to consumed.json`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add consumed.json
          if git diff --cached --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "chore: sync consumed.json from Notion"
            git push
          fi
