<!DOCTYPE html>
<html>
<head>
  <title>projects. Abel Tomy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="../image.JPG">
  <link rel="stylesheet" href="../style.css?v=2">
  <script src="../components/analytics.js"></script>
</head>
<body>
 <div id="site-nav"></div>

  <div class="view-toggle">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="software">Software</button>
      <button class="filter-btn" data-filter="hardware">Hardware</button>
    </div>
    <div style="display:flex;gap:0.3em">
      <button id="btn-grid" class="view-btn" title="Grid view" aria-label="Grid view">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="1" width="6" height="6" rx="1"/>
          <rect x="9" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="9" width="6" height="6" rx="1"/>
          <rect x="9" y="9" width="6" height="6" rx="1"/>
        </svg>
      </button>
      <button id="btn-list" class="view-btn" title="List view" aria-label="List view">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="2" width="2" height="2" rx="0.5"/>
          <rect x="5" y="2" width="10" height="2" rx="0.5"/>
          <rect x="1" y="7" width="2" height="2" rx="0.5"/>
          <rect x="5" y="7" width="10" height="2" rx="0.5"/>
          <rect x="1" y="12" width="2" height="2" rx="0.5"/>
          <rect x="5" y="12" width="10" height="2" rx="0.5"/>
        </svg>
      </button>
    </div>
  </div>

  <section class="project-section">
    <h2>2025</h2>
    <div class="project-grid">
      <a class="project-card" href="https://screenpaint.abeltomy.workers.dev/" data-tags="software">
        <div class="project-card-img" style="background-image: url('thumbs/screen.png')"></div>
        <div class="project-card-body">
          <span class="project-card-title">Screen Paint</span>
          <span class="project-tag">software</span>
        </div>
      </a>
      <a class="project-card" href="https://abeltomy.github.io/IMG_2208/" data-tags="software">
        <div class="project-card-img" style="background-image: url('thumbs/img2208.png')"></div>
        <div class="project-card-body">
          <span class="project-card-title">IMG_2208 &mdash; real reel</span>
          <span class="project-tag">software</span>
        </div>
      </a>
      <a class="project-card" href="https://github.com/abeltomy/feed.abeltomy" data-tags="software">
        <div class="project-card-img" style="background-image: url('thumbs/feed.png')"></div>
        <div class="project-card-body">
          <span class="project-card-title">Personal Timeline Feed</span>
          <span class="project-tag">software</span>
        </div>
      </a>
    </div>
  </section>

  <section class="project-section">
    <h2>2021</h2>
    <div class="project-grid">
      <a class="project-card" href="https://github.com/abeltomy/P-CNC" data-tags="hardware">
        <div class="project-card-img" style="background-image: url('thumbs/pcnc.png')"></div>
        <div class="project-card-body">
          <span class="project-card-title">PCNC</span>
          <span class="project-tag">hardware</span>
        </div>
      </a>
    </div>
  </section>

  <section class="project-section">
    <h2>Courses</h2>
    <div class="project-grid">
      <a class="project-card" href="https://www.fabacademy.org/2021/labs/kochi/students/abel-tomy/" data-tags="hardware software">
        <div class="project-card-img" style="background-image: url('thumbs/fabacademy.jpg')"></div>
        <div class="project-card-body">
          <span class="project-card-title">Fab Academy 2021</span>
          <span class="project-tag">hardware &amp; software</span>
        </div>
      </a>
    </div>
  </section>

<script src="../components/navbar.js?v=3"></script>
<script>
(function () {
  var mode = localStorage.getItem('projectView') || 'grid';
  var btnGrid = document.getElementById('btn-grid');
  var btnList = document.getElementById('btn-list');
  function applyView(m) {
    document.body.classList.toggle('list-mode', m === 'list');
    btnGrid.classList.toggle('active', m === 'grid');
    btnList.classList.toggle('active', m === 'list');
    localStorage.setItem('projectView', m);
  }
  btnGrid.onclick = function () { applyView('grid'); };
  btnList.onclick = function () { applyView('list'); };
  applyView(mode);

  var filterBtns = document.querySelectorAll('.filter-btn');
  var activeFilter = 'all';
  function applyFilter(f) {
    activeFilter = f;
    filterBtns.forEach(function (b) {
      b.classList.toggle('active', b.dataset.filter === f);
    });
    document.querySelectorAll('.project-card').forEach(function (card) {
      var tags = (card.dataset.tags || '').split(' ');
      var show = f === 'all' || tags.indexOf(f) !== -1;
      card.style.display = show ? '' : 'none';
    });
    document.querySelectorAll('.project-section').forEach(function (sec) {
      var visible = sec.querySelectorAll('.project-card:not([style*="display: none"])').length;
      // recheck properly
      var anyVisible = false;
      sec.querySelectorAll('.project-card').forEach(function (c) {
        if (c.style.display !== 'none') anyVisible = true;
      });
      sec.style.display = anyVisible ? '' : 'none';
    });
  }
  filterBtns.forEach(function (b) {
    b.onclick = function () { applyFilter(b.dataset.filter); };
  });
}());
</script>
</body>
</html>
